<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>财务体检聊天界面原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: '#1E3A8A',
              mint: '#10B981',
              page: '#F8FAFC',
              panel: '#FFFFFF',
              bubbleAi: '#F1F5F9',
              bubbleUser: '#EFF6FF'
            },
            fontFamily: {
              sans: ['Inter', 'PingFang SC', 'Source Han Sans SC', 'sans-serif']
            },
            boxShadow: {
              bubble: '0 2px 8px rgba(15, 23, 42, 0.08)'
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-slate-100 font-sans text-slate-800 antialiased dark:bg-slate-950">
    <main
      id="app"
      class="mx-auto flex h-[100dvh] w-full max-w-[375px] flex-col overflow-hidden bg-page dark:bg-[#0F172A]"
    >
      <header class="border-b border-slate-200 bg-panel px-4 pt-[max(12px,env(safe-area-inset-top))] dark:border-slate-700 dark:bg-[#0F172A]">
        <div class="flex items-center justify-between py-2">
          <button class="h-9 w-9 rounded-full bg-slate-100 text-brand dark:bg-slate-800 dark:text-slate-100" aria-label="返回">
            ←
          </button>
          <h1 class="text-[20px] font-semibold text-slate-900 dark:text-slate-100">财务体检</h1>
          <button
            id="darkToggle"
            class="h-9 rounded-full bg-slate-100 px-3 text-sm text-slate-600 dark:bg-slate-800 dark:text-slate-200"
            type="button"
          >
            深色
          </button>
        </div>
        <div class="flex items-center justify-between pb-3">
          <p class="text-sm font-medium text-slate-500 dark:text-slate-400">财务体检 · 大约5分钟</p>
          <button
            id="exitBtn"
            class="rounded-lg bg-bubbleAi px-3 py-1.5 text-[13px] font-medium text-slate-600 dark:bg-slate-800 dark:text-slate-200"
            type="button"
          >
            退出
          </button>
        </div>
      </header>

      <section id="chatList" class="flex-1 space-y-3 overflow-y-auto px-4 py-4">
        <div class="flex justify-start">
          <div class="relative max-w-[80%] rounded-2xl rounded-tl-md bg-bubbleAi px-4 py-3 text-[15px] leading-relaxed text-slate-800 shadow-bubble dark:bg-[#1E293B] dark:text-slate-100">
            <span id="typingText"></span><span class="animate-pulse text-brand dark:text-mint">|</span>
            <i class="absolute -left-1 top-3 h-2 w-2 rotate-45 bg-bubbleAi dark:bg-[#1E293B]"></i>
          </div>
        </div>
        <p class="py-1 text-center text-[13px] text-slate-400 dark:text-slate-500">
          请输入你的想法，或上传相关财务文件
        </p>
      </section>

      <footer id="composer" class="border-t border-slate-200 bg-panel px-4 pb-[max(10px,env(safe-area-inset-bottom))] pt-2.5 dark:border-slate-700 dark:bg-[#0F172A]">
        <div class="flex items-end gap-2.5">
          <div class="flex items-center gap-2">
            <input id="fileInput" class="hidden" type="file" accept="image/*,.pdf,.csv,.xlsx" />
            <button
              id="uploadBtn"
              class="flex h-9 w-9 items-center justify-center rounded-xl bg-bubbleAi text-brand dark:bg-[#1E293B] dark:text-slate-100"
              type="button"
              title="上传文件"
            >
              ⤴
            </button>
            <button
              class="flex h-9 w-9 items-center justify-center rounded-xl bg-bubbleAi text-brand dark:bg-[#1E293B] dark:text-slate-100"
              type="button"
              title="表情"
            >
              ☺
            </button>
            <button
              class="flex h-9 w-9 items-center justify-center rounded-xl bg-bubbleAi text-brand dark:bg-[#1E293B] dark:text-slate-100"
              type="button"
              title="语音"
            >
              🎤
            </button>
          </div>

          <textarea
            id="input"
            rows="1"
            placeholder="请输入回复"
            class="max-h-[112px] min-h-[40px] flex-1 resize-none overflow-y-auto rounded-[20px] border border-transparent bg-bubbleAi px-4 py-2.5 text-base leading-5 text-slate-800 outline-none transition focus:border-brand focus:bg-white focus:shadow-[0_0_0_3px_rgba(30,58,138,0.12)] dark:bg-[#1E293B] dark:text-slate-100 dark:placeholder:text-slate-400 dark:focus:bg-[#0F172A]"
          ></textarea>

          <button
            id="sendBtn"
            class="rounded-lg bg-slate-300 px-3.5 py-2 text-[15px] font-medium text-white"
            type="button"
            disabled
          >
            发送
          </button>
        </div>
      </footer>
    </main>

    <script>
      const app = document.getElementById('app')
      const chatList = document.getElementById('chatList')
      const input = document.getElementById('input')
      const sendBtn = document.getElementById('sendBtn')
      const uploadBtn = document.getElementById('uploadBtn')
      const fileInput = document.getElementById('fileInput')
      const typingText = document.getElementById('typingText')
      const exitBtn = document.getElementById('exitBtn')
      const darkToggle = document.getElementById('darkToggle')

      const initialText = '您好，我是您的财务助手。能否简单说说，最近在财务或工作上最让您焦虑的事情是什么？'
      let typingIndex = 0
      let sending = false

      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatList.scrollTop = chatList.scrollHeight
        })
      }

      function createBubble(role, html) {
        const row = document.createElement('div')
        row.className = role === 'user' ? 'flex justify-end' : 'flex justify-start'
        const bubble = document.createElement('div')
        bubble.className =
          role === 'user'
            ? 'relative max-w-[80%] rounded-2xl rounded-tr-md bg-bubbleUser px-4 py-3 text-[15px] leading-relaxed text-brand shadow-bubble dark:bg-[#1E3A8A]/30 dark:text-slate-100'
            : 'relative max-w-[80%] rounded-2xl rounded-tl-md bg-bubbleAi px-4 py-3 text-[15px] leading-relaxed text-slate-800 shadow-bubble dark:bg-[#1E293B] dark:text-slate-100'
        const tail = document.createElement('i')
        tail.className =
          role === 'user'
            ? 'absolute -right-1 top-3 h-2 w-2 rotate-45 bg-bubbleUser dark:bg-[#1E3A8A]/30'
            : 'absolute -left-1 top-3 h-2 w-2 rotate-45 bg-bubbleAi dark:bg-[#1E293B]'
        bubble.innerHTML = html
        bubble.appendChild(tail)
        row.appendChild(bubble)
        chatList.appendChild(row)
        scrollToBottom()
      }

      function updateSendState() {
        const hasText = !!input.value.trim()
        const enabled = hasText && !sending
        sendBtn.disabled = !enabled
        sendBtn.className = enabled
          ? 'rounded-lg bg-brand px-3.5 py-2 text-[15px] font-medium text-white'
          : 'rounded-lg bg-slate-300 px-3.5 py-2 text-[15px] font-medium text-white'
      }

      function autoGrowTextarea() {
        input.style.height = '40px'
        input.style.height = Math.min(input.scrollHeight, 112) + 'px'
      }

      function sendMessage() {
        if (sendBtn.disabled) return
        const text = input.value.trim()
        if (!text) return
        sending = true
        sendBtn.textContent = '发送中…'
        updateSendState()
        createBubble('user', text)
        input.value = ''
        autoGrowTextarea()
        setTimeout(() => {
          createBubble(
            'ai',
            '收到。你也可以上传银行/支付宝/微信截图，我会自动帮你识别并继续提问。'
          )
          sending = false
          sendBtn.textContent = '发送'
          updateSendState()
        }, 700)
      }

      ;(function runTyping() {
        if (typingIndex <= initialText.length) {
          typingText.textContent = initialText.slice(0, typingIndex)
          typingIndex += 1
          scrollToBottom()
          setTimeout(runTyping, 24)
        } else {
          const caret = typingText.nextElementSibling
          if (caret) caret.remove()
        }
      })()

      input.addEventListener('input', () => {
        autoGrowTextarea()
        updateSendState()
      })
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault()
          sendMessage()
        }
      })
      sendBtn.addEventListener('click', sendMessage)

      uploadBtn.addEventListener('click', () => fileInput.click())
      fileInput.addEventListener('change', () => {
        const file = fileInput.files && fileInput.files[0]
        if (!file) return
        const html = `
          <div class="space-y-2">
            <p class="text-[13px] text-slate-500 dark:text-slate-300">已上传文件</p>
            <div class="rounded-xl border border-slate-200 bg-white p-3 dark:border-slate-600 dark:bg-slate-800">
              <p class="truncate text-[14px] font-medium text-slate-700 dark:text-slate-100">${file.name}</p>
              <p class="mt-1 text-[13px] text-slate-400">${Math.ceil(file.size / 1024)} KB · 点击查看</p>
            </div>
          </div>
        `
        createBubble('user', html)
        setTimeout(() => {
          createBubble('ai', '文件已收到，正在OCR解析中。请稍等，我会把关键信息整理给你确认。')
        }, 350)
      })

      exitBtn.addEventListener('click', () => {
        if (window.confirm('已为你保存当前进度，确认退出财务体检吗？')) {
          alert('已退出流程')
        }
      })

      darkToggle.addEventListener('click', () => {
        app.classList.toggle('dark')
      })

      window.addEventListener('resize', scrollToBottom)
      input.addEventListener('focus', scrollToBottom)
      autoGrowTextarea()
      updateSendState()
    </script>
  </body>
</html>
